<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The AI Innovator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --green: #00e676;
    --green-dark: #00a152;
    --green-glow: rgba(0, 230, 118, 0.3);
    --accent: #7c4dff;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px 20px 40px 20px;
    position: relative;
  }

  /* Dynamic spotlight background */
  @keyframes drift1 {
    0%   { transform: translate(0%, 0%) scale(1); }
    25%  { transform: translate(30%, 20%) scale(1.1); }
    50%  { transform: translate(-10%, 40%) scale(0.95); }
    75%  { transform: translate(-30%, -10%) scale(1.05); }
    100% { transform: translate(0%, 0%) scale(1); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0%, 0%) scale(1); }
    25%  { transform: translate(-25%, -30%) scale(1.15); }
    50%  { transform: translate(20%, -10%) scale(0.9); }
    75%  { transform: translate(10%, 30%) scale(1.1); }
    100% { transform: translate(0%, 0%) scale(1); }
  }
  @keyframes drift3 {
    0%   { transform: translate(0%, 0%) scale(1.05); }
    30%  { transform: translate(20%, -25%) scale(0.95); }
    60%  { transform: translate(-20%, 15%) scale(1.1); }
    100% { transform: translate(0%, 0%) scale(1.05); }
  }
  @keyframes drift4 {
    0%   { transform: translate(0%, 0%) scale(1); }
    35%  { transform: translate(-15%, 25%) scale(1.08); }
    65%  { transform: translate(25%, -20%) scale(0.92); }
    100% { transform: translate(0%, 0%) scale(1); }
  }
  @keyframes drift5 {
    0%   { transform: translate(0%, 0%) scale(0.95); }
    20%  { transform: translate(15%, -15%) scale(1.1); }
    45%  { transform: translate(-25%, 10%) scale(1); }
    70%  { transform: translate(10%, 25%) scale(0.9); }
    100% { transform: translate(0%, 0%) scale(0.95); }
  }

  .bg-spotlights {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .bg-spotlights::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--bg);
  }

  .spot {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    will-change: transform, opacity;
  }
  /* Deep purple spotlight */
  .spot-1 {
    width: 30vw; height: 30vw;
    top: -5%; left: 5%;
    background: radial-gradient(circle, rgba(100, 40, 200, 0.18) 0%, rgba(100, 40, 200, 0.06) 40%, transparent 60%);
    animation: drift1 22s ease-in-out infinite, pulse1 8s ease-in-out infinite;
  }
  /* Emerald green spotlight */
  .spot-2 {
    width: 28vw; height: 28vw;
    bottom: 5%; right: 0%;
    background: radial-gradient(circle, rgba(0, 200, 100, 0.14) 0%, rgba(0, 200, 100, 0.04) 40%, transparent 60%);
    animation: drift2 26s ease-in-out infinite, pulse2 10s ease-in-out infinite;
  }
  /* Royal blue spotlight */
  .spot-3 {
    width: 35vw; height: 35vw;
    top: 25%; left: 35%;
    background: radial-gradient(circle, rgba(20, 30, 120, 0.22) 0%, rgba(20, 30, 120, 0.08) 35%, transparent 55%);
    animation: drift3 30s ease-in-out infinite, pulse3 12s ease-in-out infinite;
  }
  /* Mexican pink spotlight */
  .spot-4 {
    width: 22vw; height: 22vw;
    top: 55%; left: 15%;
    background: radial-gradient(circle, rgba(220, 50, 120, 0.1) 0%, rgba(220, 50, 120, 0.03) 40%, transparent 58%);
    animation: drift4 18s ease-in-out infinite, pulse1 9s ease-in-out infinite 2s;
  }
  /* Warm pink spotlight */
  .spot-5 {
    width: 20vw; height: 20vw;
    top: 10%; right: 10%;
    background: radial-gradient(circle, rgba(230, 70, 140, 0.08) 0%, rgba(230, 70, 140, 0.02) 40%, transparent 58%);
    animation: drift5 24s ease-in-out infinite, pulse2 7s ease-in-out infinite 1s;
  }
  /* Violet spotlight */
  .spot-6 {
    width: 25vw; height: 25vw;
    top: 40%; right: 5%;
    background: radial-gradient(circle, rgba(140, 50, 180, 0.12) 0%, rgba(140, 50, 180, 0.04) 38%, transparent 56%);
    animation: drift1 28s ease-in-out infinite reverse, pulse3 11s ease-in-out infinite;
  }
  /* Teal spotlight */
  .spot-7 {
    width: 26vw; height: 26vw;
    bottom: 15%; left: -5%;
    background: radial-gradient(circle, rgba(0, 150, 120, 0.09) 0%, rgba(0, 150, 120, 0.03) 38%, transparent 56%);
    animation: drift5 23s ease-in-out infinite reverse, pulse1 13s ease-in-out infinite 3s;
  }

  /* Subtle breathing/pulsing - no color shift, just intensity */
  @keyframes pulse1 {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }
  @keyframes pulse2 {
    0%, 100% { opacity: 0.7; }
    35%      { opacity: 1; }
    70%      { opacity: 0.4; }
  }
  @keyframes pulse3 {
    0%, 100% { opacity: 0.8; }
    50%      { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1400px;
    width: 92vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  /* Header - fixed at top */
  .header {
    position: fixed;
    top: 16px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 100;
    pointer-events: none;
  }
  .header h1 {
    font-size: clamp(3.3rem, 6.4vw, 5.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 1.7rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.06em;
  }

  /* Slot Machine Grid */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .slot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .slot-label {
    font-size: 1.1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  /* Slot Window - Mechanical Odometer Drum */
  .slot-window {
    width: 100%;
    height: 240px;
    background: linear-gradient(
      180deg,
      #050508 0%,
      #08080e 3%,
      #0c0c14 6%,
      #12121c 10%,
      #181824 16%,
      #1e1e2c 24%,
      #222234 35%,
      #252538 45%,
      #262639 50%,
      #252538 55%,
      #222234 65%,
      #1e1e2c 76%,
      #181824 84%,
      #12121c 90%,
      #0c0c14 94%,
      #08080e 97%,
      #050508 100%
    );
    border: none;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: box-shadow 0.3s;
    box-shadow:
      inset 0 20px 40px rgba(0, 0, 0, 0.9),
      inset 0 -20px 40px rgba(0, 0, 0, 0.9),
      inset 6px 0 16px rgba(0, 0, 0, 0.5),
      inset -6px 0 16px rgba(0, 0, 0, 0.5),
      0 2px 8px rgba(0, 0, 0, 0.6),
      0 0 1px rgba(255, 255, 255, 0.05);
  }
  .slot-window:hover {
    box-shadow:
      inset 0 20px 40px rgba(0, 0, 0, 0.9),
      inset 0 -20px 40px rgba(0, 0, 0, 0.9),
      inset 6px 0 16px rgba(0, 0, 0, 0.5),
      inset -6px 0 16px rgba(0, 0, 0, 0.5),
      0 0 20px rgba(124, 77, 255, 0.12);
  }
  .slot-window.spinning {
    box-shadow:
      inset 0 20px 40px rgba(0, 0, 0, 0.9),
      inset 0 -20px 40px rgba(0, 0, 0, 0.9),
      inset 6px 0 16px rgba(0, 0, 0, 0.5),
      inset -6px 0 16px rgba(0, 0, 0, 0.5),
      0 2px 8px rgba(0, 0, 0, 0.6);
  }
  .slot-window.locked {
    box-shadow:
      inset 0 20px 40px rgba(0, 0, 0, 0.9),
      inset 0 -20px 40px rgba(0, 0, 0, 0.9),
      inset 6px 0 16px rgba(0, 0, 0, 0.5),
      inset -6px 0 16px rgba(0, 0, 0, 0.5),
      0 2px 8px rgba(0, 0, 0, 0.6);
  }

  /* Deep cylindrical curvature - items roll into darkness at top/bottom */
  .slot-window::before, .slot-window::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    z-index: 2;
    pointer-events: none;
  }
  .slot-window::before {
    top: 0;
    height: 90px;
    background: linear-gradient(
      to bottom,
      rgba(5, 5, 8, 1) 0%,
      rgba(5, 5, 8, 0.97) 15%,
      rgba(8, 8, 14, 0.88) 30%,
      rgba(12, 12, 20, 0.7) 45%,
      rgba(16, 16, 26, 0.4) 60%,
      rgba(20, 20, 32, 0.15) 80%,
      transparent 100%
    );
    border-radius: 8px 8px 0 0;
  }
  .slot-window::after {
    bottom: 0;
    height: 90px;
    background: linear-gradient(
      to top,
      rgba(5, 5, 8, 1) 0%,
      rgba(5, 5, 8, 0.97) 15%,
      rgba(8, 8, 14, 0.88) 30%,
      rgba(12, 12, 20, 0.7) 45%,
      rgba(16, 16, 26, 0.4) 60%,
      rgba(20, 20, 32, 0.15) 80%,
      transparent 100%
    );
    border-radius: 0 0 8px 8px;
  }

  /* Specular highlight - horizontal band simulating light on a cylinder */
  .slot-window-inner {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    z-index: 3;
    pointer-events: none;
    background:
      linear-gradient(
        180deg,
        transparent 0%,
        transparent 38%,
        rgba(255, 255, 255, 0.03) 44%,
        rgba(255, 255, 255, 0.05) 48%,
        rgba(255, 255, 255, 0.06) 50%,
        rgba(255, 255, 255, 0.05) 52%,
        rgba(255, 255, 255, 0.03) 56%,
        transparent 62%,
        transparent 100%
      ),
      linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.3) 0%,
        transparent 8%,
        transparent 92%,
        rgba(0, 0, 0, 0.3) 100%
      );
  }

  /* Center line - now a single continuous bar behind slots-grid */
  .slots-wrapper {
    position: relative;
    width: 100%;
  }
  .center-bar { display: none; }

  /* Per-slot focus line - renders only over each drum */
  .slot-focus-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 80px;
    transform: translateY(-50%);
    border-top: 1.5px solid rgba(124, 77, 255, 0.12);
    border-bottom: 1.5px solid rgba(124, 77, 255, 0.12);
    z-index: 4;
    pointer-events: none;
    background: rgba(124, 77, 255, 0.015);
  }

  /* Hide per-slot center lines */
  .slot-window .center-line { display: none; }

  .slot-reel {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: none;
    visibility: hidden;
  }
  .slot-reel.visible {
    visibility: visible;
  }

  .slot-item {
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 3.5rem;
    user-select: none;
    transition: opacity 0.3s, filter 0.3s;
    opacity: 0.08;
    filter: grayscale(0.9) brightness(0.35);
    position: relative;
    border-bottom: 1px solid rgba(60, 60, 80, 0.15);
    border-top: 1px solid rgba(0, 0, 0, 0.3);
  }
  .slot-item.in-view {
    opacity: 1;
    filter: none;
  }

  /* Search filter input */
  .manual-select {
    width: 100%;
    position: relative;
  }
  .filter-input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1.1rem;
    font-family: inherit;
    text-align: center;
    transition: all 0.2s;
    outline: none;
  }
  .filter-input::placeholder {
    color: var(--text-dim);
  }
  .filter-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(124, 77, 255, 0.15);
  }
  .filter-input.has-selection {
    color: var(--green);
    border-color: rgba(0, 230, 118, 0.3);
  }

  .dropdown {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
    min-width: 180px;
    max-height: 280px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    z-index: 100;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dropdown-item:hover {
    background: var(--surface2);
  }
  .dropdown-item .emoji { font-size: 1.3rem; }

  /* Machine row layout */
  .machine-row {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
  }
  .machine-row .slots-wrapper {
    flex: 1;
    min-width: 0;
  }

  /* ============ HYPER-REALISTIC CASINO LEVER ============ */
  .lever-wrapper {
    width: 62px;
    height: 200px;
    position: relative;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .lever-wrapper.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  /* Steel mounting bracket on the "machine" side */
  .lever-mount {
    position: absolute;
    left: 0;
    top: 60px;
    width: 20px;
    height: 80px;
    background:
      linear-gradient(135deg, #5a5a6a 0%, #3a3a4a 30%, #4a4a5a 50%, #2a2a3a 100%);
    border-radius: 4px 0 0 4px;
    border: 1px solid #555;
    border-right: none;
    box-shadow:
      inset 1px 1px 2px rgba(255,255,255,0.1),
      inset -1px -1px 2px rgba(0,0,0,0.3),
      -2px 0 8px rgba(0,0,0,0.4);
  }
  .mount-bolt {
    position: absolute;
    left: 5px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 40% 35%, #888, #555 60%, #333);
    border: 1px solid #444;
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.2),
      0 1px 2px rgba(0,0,0,0.4);
  }
  .mount-bolt::after {
    content: '+';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #333;
    font-weight: bold;
    line-height: 1;
  }
  .top-bolt { top: 12px; }
  .bottom-bolt { bottom: 12px; }

  /* Pivot housing: the cylinder the arm rotates around */
  .lever-pivot-housing {
    position: absolute;
    left: 16px;
    top: 88px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 45% 40%, #6a6a7a, #3a3a4a 60%, #2a2a3a);
    border: 2px solid #555;
    box-shadow:
      0 2px 6px rgba(0,0,0,0.5),
      inset 0 1px 2px rgba(255,255,255,0.15),
      inset 0 -1px 2px rgba(0,0,0,0.3);
    z-index: 2;
  }
  .pivot-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 40% 35%, #999, #555 70%);
    border: 1px solid #666;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.3);
  }

  /* The moving arm assembly */
  .lever-arm-assembly {
    position: absolute;
    left: 26px;
    top: 10px;
    width: 14px;
    height: 96px;
    transform-origin: 50% 93px;
    transition: none;
    z-index: 1;
  }
  .lever-arm-assembly.pulled {
    animation: leverPull3D 1s cubic-bezier(0.2, 0, 0.2, 1) forwards;
  }

  @keyframes leverPull3D {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(45deg); }
    40%  { transform: rotate(45deg); }
    65%  { transform: rotate(-6deg); }
    80%  { transform: rotate(3deg); }
    90%  { transform: rotate(-1deg); }
    100% { transform: rotate(0deg); }
  }

  /* Chrome shaft */
  .lever-shaft {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 80px;
    background:
      linear-gradient(90deg,
        #666 0%,
        #aaa 15%,
        #ddd 30%,
        #fff 42%,
        #ddd 50%,
        #bbb 65%,
        #888 80%,
        #666 100%);
    border-radius: 5px;
    box-shadow:
      2px 2px 6px rgba(0,0,0,0.4),
      -1px -1px 3px rgba(0,0,0,0.2);
  }

  /* Rubber grip section */
  .lever-grip {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 38px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 2px 0;
  }
  .grip-ring {
    width: 100%;
    height: 5px;
    border-radius: 3px;
    background:
      linear-gradient(90deg,
        #222 0%, #444 20%, #555 40%, #444 60%, #333 80%, #222 100%);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.08),
      inset 0 -1px 1px rgba(0,0,0,0.3);
  }

  /* The big red ball */
  .lever-ball {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 32%,
        #ff6b6b 0%,
        #ff3333 20%,
        #dd1111 45%,
        #bb0000 65%,
        #880000 85%,
        #550000 100%);
    border: 1.5px solid rgba(100, 0, 0, 0.6);
    box-shadow:
      0 0 15px rgba(255, 40, 40, 0.4),
      0 4px 10px rgba(0, 0, 0, 0.5),
      0 1px 3px rgba(0, 0, 0, 0.3),
      inset 0 -4px 8px rgba(60, 0, 0, 0.5),
      inset 0 2px 4px rgba(255, 130, 130, 0.3);
    transition: box-shadow 0.3s;
  }
  .lever-wrapper:hover .lever-ball {
    box-shadow:
      0 0 25px rgba(255, 40, 40, 0.6),
      0 0 50px rgba(255, 40, 40, 0.2),
      0 4px 10px rgba(0, 0, 0, 0.5),
      0 1px 3px rgba(0, 0, 0, 0.3),
      inset 0 -4px 8px rgba(60, 0, 0, 0.5),
      inset 0 2px 4px rgba(255, 130, 130, 0.3);
  }

  /* Specular highlight on the ball */
  .ball-highlight {
    position: absolute;
    top: 5px;
    left: 18%;
    width: 45%;
    height: 35%;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(255, 255, 255, 0.7) 0%,
      rgba(255, 255, 255, 0.3) 40%,
      transparent 70%);
    border-radius: 50%;
    transform: rotate(-15deg);
  }
  /* Secondary reflection */
  .lever-ball::after {
    content: '';
    position: absolute;
    bottom: 6px;
    right: 8px;
    width: 20%;
    height: 15%;
    background: radial-gradient(ellipse,
      rgba(255, 200, 200, 0.25) 0%,
      transparent 70%);
    border-radius: 50%;
  }

  /* Label */
  .lever-label-text {
    position: absolute;
    bottom: -4px;
    width: 100%;
    text-align: center;
    font-size: 0.55rem;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: #555;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* GO Button - rises from below like a stage elevator */
  .go-section {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(200px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
  }
  .go-section.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  @keyframes fadeUp {

// State
const selections = [null, null, null, null, null];
const reels = [];
let spinning = false;

function buildSlots() {
  const grid = document.getElementById('slotsGrid');
  CATEGORIES.forEach((cat, ci) => {
    const col = document.createElement('div');
    col.className = 'slot-col';

    const label = document.createElement('div');
    label.className = 'slot-label';
    label.textContent = cat.label;
    col.appendChild(label);

    // Slot window
    const win = document.createElement('div');
    win.className = 'slot-window';
    win.id = `slot-${ci}`;

    // Focus line overlay (per-slot, aligned to item height)
    const focusLine = document.createElement('div');
    focusLine.className = 'slot-focus-line';
    win.appendChild(focusLine);

    // 3D specular highlight overlay
    const innerHighlight = document.createElement('div');
    innerHighlight.className = 'slot-window-inner';
    win.appendChild(innerHighlight);

    // Build reel: repeat items many times for scrolling
    const reel = document.createElement('div');
    reel.className = 'slot-reel';
    reel.id = `reel-${ci}`;

    const repeats = 8;
    for (let r = 0; r < repeats; r++) {
      cat.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'slot-item';
        div.textContent = item.emoji;
        reel.appendChild(div);
      });
    }

    win.appendChild(reel);
    col.appendChild(win);

    // Position reel between items so nothing is centered on load
    const itemH = 80;
    const winH = 240;
    const offset = Math.floor(Math.random() * cat.items.length);
    const centerOffset = (winH / 2);
    reel.style.top = `${centerOffset - offset * itemH}px`;

    // Click on slot window to open dropdown
    win.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      const dd = document.getElementById(`dropdown-${ci}`);
      dd.classList.toggle('open');
      const input = document.getElementById(`filter-${ci}`);
      if (dd.classList.contains('open')) {
        input.focus();
      }
    });

    // Filter input + dropdown
    const manualDiv = document.createElement('div');
    manualDiv.className = 'manual-select';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'filter-input';
    input.placeholder = `Search ${cat.label.toLowerCase()}...`;
    input.id = `filter-${ci}`;

    const dd = document.createElement('div');
    dd.className = 'dropdown';
    dd.id = `dropdown-${ci}`;

    cat.items.forEach((item, ii) => {
      const opt = document.createElement('div');
      opt.className = 'dropdown-item';
      opt.dataset.name = item.name.toLowerCase();
      opt.dataset.index = ii;
      opt.innerHTML = `<span class="emoji">${item.emoji}</span> ${item.name}`;
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        selectManual(ci, ii);
        dd.classList.remove('open');
        input.value = '';
        filterDropdown(ci, '');
      });
      dd.appendChild(opt);
    });

    input.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      input.value = '';
      input.classList.remove('has-selection');
      filterDropdown(ci, '');
      dd.classList.add('open');
    });

    input.addEventListener('focus', () => {
      input.value = '';
      input.classList.remove('has-selection');
      filterDropdown(ci, '');
    });

    input.addEventListener('input', (e) => {
      e.stopPropagation();
      if (!dd.classList.contains('open')) dd.classList.add('open');
      filterDropdown(ci, input.value);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        dd.classList.remove('open');
        input.blur();
      }
    });

    manualDiv.appendChild(input);
    manualDiv.appendChild(dd);
    col.appendChild(manualDiv);

    grid.appendChild(col);
    reels.push({ reel, win, itemCount: cat.items.length, itemH, winH });
  });

  // Close dropdowns on outside click
  document.addEventListener('click', () => {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
  });

  // Initial highlight
  updateAllInView();
  positionCenterBar();
}

function positionCenterBar() {
  const wrapper = document.getElementById('slotsWrapper');
  const firstWin = document.querySelector('.slot-window');
  if (!firstWin || !wrapper) return;
  const wrapperRect = wrapper.getBoundingClientRect();
  const winRect = firstWin.getBoundingClientRect();
  const bar = document.getElementById('centerBar');
  const winCenterY = winRect.top + winRect.height / 2 - wrapperRect.top;
  bar.style.top = `${winCenterY}px`;
}

function updateInView(ci) {
  const r = reels[ci];
  const reelTop = parseFloat(r.reel.style.top) || 0;
  const centerY = r.winH / 2;
  const items = r.reel.querySelectorAll('.slot-item');
  items.forEach((el, i) => {
    const itemCenterY = i * r.itemH + r.itemH / 2 + reelTop;
    const dist = Math.abs(itemCenterY - centerY);
    if (dist < r.itemH * 0.6) {
      el.classList.add('in-view');
    } else {
      el.classList.remove('in-view');
    }
  });
}

function updateAllInView() {
  reels.forEach((_, ci) => updateInView(ci));
}

function filterDropdown(ci, query) {
  const dd = document.getElementById(`dropdown-${ci}`);
  const items = dd.querySelectorAll('.dropdown-item');
  const q = query.toLowerCase().trim();
  items.forEach(item => {
    if (!q || item.dataset.name.includes(q)) {
      item.style.display = '';
    } else {
      item.style.display = 'none';
    }
  });
}

function selectManual(catIdx, itemIdx) {
  const cat = CATEGORIES[catIdx];
  const item = cat.items[itemIdx];
  selections[catIdx] = item;

  // Animate reel to that item
  const r = reels[catIdx];
  r.reel.classList.add('visible');
  const centerOffset = (r.winH / 2) - (r.itemH / 2);
  // Target position: center of reel, use 3rd repeat
  const targetIdx = cat.items.length * 3 + itemIdx;
  const targetTop = centerOffset - targetIdx * r.itemH;

  r.reel.style.transition = 'top 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
  r.reel.style.top = `${targetTop}px`;
  r.win.classList.add('locked');

  const input = document.getElementById(`filter-${catIdx}`);
  input.value = `${item.emoji} ${item.name}`;
  input.classList.add('has-selection');

  setTimeout(() => {
    r.reel.style.transition = 'none';
    updateInView(catIdx);
  }, 700);

  // Immediate update too
  requestAnimationFrame(() => updateInView(catIdx));

  checkAllSelected();
}

function pullLever() {
  if (spinning) return;
  const arm = document.getElementById('leverArm');

  // Animate the pull
  arm.classList.remove('pulled');
  void arm.offsetWidth; // reflow
  arm.classList.add('pulled');

  // Start reels after the lever reaches the bottom (250ms into animation)
  setTimeout(() => spinAll(), 250);
}

function spinAll() {
  if (spinning) return;
  spinning = true;

  const wrapper = document.getElementById('leverWrapper');
  wrapper.classList.add('disabled');

  document.getElementById('goSection').classList.remove('visible');

  // Random target for each
  const targets = CATEGORIES.map(cat => Math.floor(Math.random() * cat.items.length));

  reels.forEach((r, ci) => {
    const cat = CATEGORIES[ci];
    r.win.classList.remove('locked');
    r.win.classList.add('spinning');
    r.reel.classList.add('visible');

    // Animate: fast scroll, then decelerate to target
    const centerOffset = (r.winH / 2) - (r.itemH / 2);
    const targetIdx = cat.items.length * 5 + targets[ci];
    const targetTop = centerOffset - targetIdx * r.itemH;

    // Stagger stop times for each reel (casino feel)
    const duration = 1.5 + ci * 0.5;

    r.reel.style.transition = `top ${duration}s cubic-bezier(0.12, 0.8, 0.3, 1)`;
    // Nudge to start spinning from wherever
    requestAnimationFrame(() => {
      r.reel.style.top = `${targetTop}px`;
    });

    // Update highlight during spin animation
    const spinInterval = setInterval(() => updateInView(ci), 50);

    setTimeout(() => {
      clearInterval(spinInterval);
      r.win.classList.remove('spinning');
      r.win.classList.add('locked');
      r.reel.style.transition = 'none';

      selections[ci] = cat.items[targets[ci]];
      updateInView(ci);

      const minput = document.getElementById(`filter-${ci}`);
      minput.value = `${selections[ci].emoji} ${selections[ci].name}`;
      minput.classList.add('has-selection');

      // If last reel, finalize
      if (ci === CATEGORIES.length - 1) {
        spinning = false;
        wrapper.classList.remove('disabled');
        checkAllSelected();
      }
    }, duration * 1000 + 100);
  });
}

function checkAllSelected() {
  const allDone = selections.every(s => s !== null);
  document.getElementById('centerBar').classList.toggle('all-locked', allDone);
  if (allDone) {
    const goSection = document.getElementById('goSection');
    goSection.classList.add('visible');

    const preview = document.getElementById('selectionsPreview');
    preview.innerHTML = selections.map(s => s.emoji).join('  ');
  }
}

  const [country, fruit, animal, action, wildCard] = selections;

  const prompt = `INSTRUCTIONS: Execute each step in sequence, ensuring that the output of each step is the input for the next one.

country ${country.emoji}
fruit ${fruit.emoji}
animal ${animal.emoji}
action ${action.emoji}
fifth parameter [surprise me, you choose this]${wildCard.emoji}

write a short story in a single paragraph.

(b) Take that short story and transform it into an academic research question.

(c) Conduct brief research focused on diagnosing a problem or opportunity. The output here will be a clear problem statement that includes a narrow customer/user segment in any sector (public or private)

(d) Design a solution for it. This offering could be a physical product, a service or a hybrid solution. Define who the provider is, e.g., a startup, a branch of government or agency, a corporation, a non-profit organisation, etc.

  // Press the button down, then transition

function openModal(type) {
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  const copyBtn = document.getElementById('modalCopyBtn');
  const pdfBtn = document.getElementById('modalPdfBtn');

  if (type === 'prompt') {
    title.textContent = 'Generated Prompt';
    body.className = 'modal-body modal-body--text';
    body.textContent = window._generatedPrompt;
    copyBtn.style.display = 'flex';
    pdfBtn.style.display = 'none';
  } else {
    title.textContent = 'Innovation Brief';
    body.className = 'modal-body modal-body--brief';
    body.innerHTML = '<iframe id="briefIframe"></iframe>';
    const iframe = document.getElementById('briefIframe');
    iframe.srcdoc = window._generatedBrief;
    copyBtn.style.display = 'none';
    pdfBtn.style.display = 'flex';
  }

  overlay.classList.add('active');
  document.addEventListener('keydown', modalEscHandler);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.removeEventListener('keydown', modalEscHandler);
}

function modalEscHandler(e) {
  if (e.key === 'Escape') closeModal();
}

function copyFromModal() {
  navigator.clipboard.writeText(window._generatedPrompt).then(() => {
    const btn = document.getElementById('modalCopyBtn');
    const copyIcon = document.getElementById('modalCopyIcon');
    const checkIcon = document.getElementById('modalCheckIcon');

    btn.classList.add('copied');
    copyIcon.style.display = 'none';
    checkIcon.style.display = 'block';

    setTimeout(() => {
      btn.classList.remove('copied');
      copyIcon.style.display = 'block';
      checkIcon.style.display = 'none';
    }, 2000);
  });
}

function exportBriefPdf() {
  const btn = document.getElementById('modalPdfBtn');
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';

  // Create an offscreen container, inject the brief HTML, render to PDF
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:1050px;';
  document.body.appendChild(container);

  // Parse the brief HTML and extract the body content + styles
  const parser = new DOMParser();
  const doc = parser.parseFromString(window._generatedBrief, 'text/html');
  const styles = doc.querySelectorAll('style');
  const bodyContent = doc.body.innerHTML;

  // Build a self-contained element
  styles.forEach(s => container.appendChild(s.cloneNode(true)));
  const inner = document.createElement('div');
  inner.innerHTML = bodyContent;
  // Apply body styles from the brief
  inner.style.cssText = 'max-width:1050px;padding:60px 48px 48px 48px;font-family:Inter,-apple-system,sans-serif;color:#1a1a2e;background:#fff;';
  container.appendChild(inner);

  // Wait for fonts to load, then render
  setTimeout(() => {
    html2pdf().set({
      margin: 0,
      filename: 'AI-Innovator-Brief.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, width: 1050 },
      jsPDF: { unit: 'px', format: [1050, 1485], hotfixes: ['px_scaling'] }
    }).from(container).save().then(() => {
      document.body.removeChild(container);
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
    });
  }, 300);
}

  selections.fill(null);
  document.getElementById('mainView').style.display = 'flex';
  document.getElementById('promptView').style.display = 'none';
  document.getElementById('goSection').classList.remove('visible');

  reels.forEach((r, ci) => {
    r.win.classList.remove('locked', 'spinning');
    const offset = Math.floor(Math.random() * CATEGORIES[ci].items.length);
    const centerOffset = (r.winH / 2) - (r.itemH / 2);
    r.reel.style.top = `${centerOffset - offset * r.itemH}px`;

    const input = document.getElementById(`filter-${ci}`);
    input.value = '';
    input.classList.remove('has-selection');
    filterDropdown(ci, '');
  });
  updateAllInView();
  document.getElementById('centerBar').classList.remove('all-locked');
}

// Init
buildSlots();
window.addEventListener('resize', positionCenterBar);
</script>
</body>
</html>
